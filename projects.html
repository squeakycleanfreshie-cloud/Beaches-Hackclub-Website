<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beaches Hack Club</title>
    <style>
        @font-face {
            font-family: 'Coolvetica';
            src: url(Coolvetica\ Rg.otf) format('opentype');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --sky: #CCF8FF;;
            --black: #000000;
            --blue: #00AADC;
            --gold: #F5A623;
            --red: #E63030;
            --white: #ffffff;
        }

        body {
            font-family: 'Coolvetica', sans-serif;
            background-color: var(--sky);
            color: var(--black);
        }

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 48px;
            background-color: var(--sky);
        }

        .logo-img {
            height: 50px;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 32px;
        }

        .nav-links a {
            font-family: Helvetica, Arial, sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: var(--black);
            text-decoration: none;
        }

        .nav-links a.active {
            color: var(--blue);
            border-bottom: 2px solid var(--blue);
            padding-bottom: 4px;
        }

        .get-involved-btn {
            font-family: Helvetica, Arial, sans-serif;
            font-weight: 600;
            color: var(--white);
            background-color: var(--blue);
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 50px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-logo">
            <img src="Asset 1.png" alt="Beaches Hack Club logo" class="logo-img">
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="projects.html" class="active">Projects</a></li>
            <li><a href="blog.html">Blog</a></li>
        </ul>
        <a href="https://hack.club/join/WVLXZM" class="get-involved-btn" target="_blank">Join Now!</a>
    </nav>

</body>
</html>
